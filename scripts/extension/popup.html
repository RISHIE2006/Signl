<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      padding: 16px;
      background: #050505;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .logo {
      background: #10b981;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 14px;
    }
    h2 { font-size: 16px; margin: 0; }
    .card {
      background: #0a0a0a;
      border: 1px solid #ffffff1a;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .btn {
      width: 100%;
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }
    .status { font-size: 12px; color: #ffffff66; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <h2>Signl | Advisor</h2>
  </div>
  
  <div class="card">
    <div style="font-size: 11px; color: #3b82f6; font-weight: bold; text-transform: uppercase;">Job Detected</div>
    <div id="job-title" style="font-size: 14px; font-weight: 600; margin: 8px 0;">Looking for analysis...</div>
    <button class="btn" id="analyse-btn">Analyse in Signl</button>
  </div>
  
  <p class="status">Go to a Job Post on LinkedIn/Indeed to start.</p>

  <script src="popup.js"></script>
</body>
</html>
