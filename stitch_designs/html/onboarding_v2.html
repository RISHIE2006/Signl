<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Signl Onboarding Profile Setup V2</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2040df",
                        "background-light": "#FBFBF9",
                        "background-dark": "#111421",
                        "slate-border": "rgba(100, 116, 139, 0.15)",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            background-color: #FBFBF9;
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col max-w-[430px] mx-auto overflow-x-hidden border-x border-slate-border">
<!-- Top App Bar Component -->
<div class="flex items-center p-6 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 transition-colors cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<div class="text-xs font-medium tracking-widest uppercase text-slate-400">Step 2 of 4</div>
</div>
<!-- Main Content Area -->
<div class="flex flex-col px-8 pt-8 pb-12 gap-12">
<!-- Header Section -->
<div class="space-y-2">
<h1 class="text-4xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Profile Setup</h1>
<p class="text-slate-500 text-sm leading-relaxed max-w-[280px]">Help us tailor the Signl experience to your professional journey.</p>
</div>
<!-- Section 1: Experience -->
<section class="flex flex-col gap-6">
<div class="flex flex-col gap-1">
<span class="text-xs font-bold text-primary uppercase tracking-tighter">01</span>
<h3 class="text-xl font-semibold tracking-tight text-slate-900 dark:text-slate-100">Select Experience</h3>
</div>
<div class="grid grid-cols-2 gap-3">
<button class="group relative flex flex-col items-center justify-center h-28 rounded-xl border-[0.5px] border-slate-border bg-white dark:bg-slate-800 transition-all hover:border-primary/40 hover:shadow-sm">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary mb-2">school</span>
<span class="text-sm font-medium text-slate-700 dark:text-slate-300">Fresher</span>
</button>
<button class="group relative flex flex-col items-center justify-center h-28 rounded-xl border-[0.5px] border-slate-border bg-white dark:bg-slate-800 transition-all hover:border-primary/40 hover:shadow-sm">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary mb-2">work_history</span>
<span class="text-sm font-medium text-slate-700 dark:text-slate-300">Professional</span>
</button>
</div>
</section>
<!-- Section 2: Aim -->
<section class="flex flex-col gap-6">
<div class="flex flex-col gap-1">
<span class="text-xs font-bold text-primary uppercase tracking-tighter">02</span>
<h3 class="text-xl font-semibold tracking-tight text-slate-900 dark:text-slate-100">Your Aim</h3>
</div>
<div class="relative">
<input class="w-full bg-white dark:bg-slate-800 border-[0.5px] border-slate-border rounded-xl px-4 py-4 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-1 focus:ring-primary/30 focus:border-primary/50 transition-all text-sm" placeholder="Target Roles (e.g. Product Designer)" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-2 pointer-events-none">
<span class="material-symbols-outlined text-slate-300 text-lg">search</span>
</div>
</div>
<div class="flex flex-wrap gap-2">
<span class="px-3 py-1.5 rounded-full bg-slate-100 dark:bg-slate-700 text-[11px] font-medium text-slate-500 dark:text-slate-400 border-[0.5px] border-slate-border">Design</span>
<span class="px-3 py-1.5 rounded-full bg-slate-100 dark:bg-slate-700 text-[11px] font-medium text-slate-500 dark:text-slate-400 border-[0.5px] border-slate-border">Engineering</span>
<span class="px-3 py-1.5 rounded-full bg-slate-100 dark:bg-slate-700 text-[11px] font-medium text-slate-500 dark:text-slate-400 border-[0.5px] border-slate-border">Marketing</span>
</div>
</section>
<!-- Bottom Action -->
<div class="mt-auto pt-8">
<button class="w-full h-14 bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 rounded-xl font-semibold text-base flex items-center justify-center gap-2 hover:opacity-90 transition-opacity">
                    Continue
                    <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<button class="w-full py-4 text-xs font-medium text-slate-400 hover:text-slate-600 transition-colors">
                    I'll do this later
                </button>
</div>
</div>
<!-- Minimalist Indicator for Phone Layout -->
<div class="flex justify-center pb-4">
<div class="w-1/3 h-1 bg-slate-200 dark:bg-slate-700 rounded-full opacity-50"></div>
</div>
</div>
</body></html>
